<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>K-daejeop | 한국 지도 검색</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#8B4513" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="K-daejeop" />
  <link rel="apple-touch-icon" href="/static/icon-pwa-192.png" />

  <link rel="icon" type="image/png" href="/static/icon-256.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v={{ v }}" />

  <!-- Supabase 설정 (auth.js에서 읽음) -->
  <meta name="supabase-url" content="{{ supabase_url }}" />
  <meta name="supabase-anon-key" content="{{ supabase_anon_key }}" />

  <!-- Google AdSense 사이트 인증용 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6570449864880886"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- ==================== 로그인 화면 ==================== -->
  <div id="login-screen" class="login-screen">
    <div class="login-screen__bg">
      <div class="login-screen__gradient"></div>
    </div>

    <div class="login-card">
      <div class="login-card__header">
        <div class="login-card__logo">
          <img src="/static/icon-256.png" alt="K-daejeop" width="48" height="48" />
        </div>
        <h1 class="login-card__title">K-daejeop</h1>
        <p class="login-card__subtitle" data-i18n-html="login.subtitle">맛집·카페·관광명소를 기록하고,<br />리뷰를 쌓아 다른 사람의 추천을 받으세요</p>
      </div>

      <div class="login-card__features">
        <div class="login-card__feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span data-i18n="login.feature.search">음식점·카페·관광명소 실시간 검색</span>
        </div>
        <div class="login-card__feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          <span data-i18n="login.feature.rating">3단계 별점 리뷰 시스템</span>
        </div>
        <div class="login-card__feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span data-i18n="login.feature.unlock">리뷰 10개 작성 → 추천 장소 해금</span>
        </div>
      </div>

      <div class="login-card__actions">
        <button id="google-login-btn" class="login-card__google-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          <span data-i18n="login.google">Google 계정으로 시작하기</span>
        </button>
      </div>

      <p class="login-card__footer" data-i18n-html="login.footer">
        로그인하면 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하게 됩니다.
      </p>
    </div>

    <!-- 로딩 스피너 (세션 확인 중) -->
    <div id="login-loading" class="login-loading">
      <div class="login-loading__spinner"></div>
    </div>
  </div>

  <!-- ==================== 앱 (로그인 후) ==================== -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand__icon">
          <img src="/static/icon-256.png" alt="" width="28" height="28" />
        </span>
        <span class="brand__name">K-daejeop</span>
      </a>

      <div class="search-wrapper">
        <div class="search">
          <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="search-input" type="text" placeholder="음식점·카페·관광명소 검색" data-i18n-placeholder="search.placeholder" autocomplete="off" spellcheck="false" />
          <button id="search-button" type="button" aria-label="검색">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </div>

        <!-- 자동완성 드롭다운 -->
        <ul id="suggestions" class="suggestions" role="listbox" aria-label="추천 검색어"></ul>
      </div>

      <!-- 내 맛집 토글 -->
      <button id="my-reviews-btn" class="my-reviews-toggle" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
        <span class="my-reviews-toggle__text" data-i18n="myReviews.title">내 맛집</span>
      </button>

      <!-- 인증 영역 -->
      <div class="auth" id="auth-area">
        <div id="user-menu" class="user-menu">
          <button id="user-menu-toggle" class="user-menu__toggle" type="button" aria-label="유저 메뉴">
            <img id="user-avatar" class="user-menu__avatar" src="" alt="" />
            <span id="user-name" class="user-menu__name"></span>
            <svg class="user-menu__caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div id="user-dropdown" class="user-menu__dropdown" hidden>
            <div class="user-menu__info">
              <span id="user-email" class="user-menu__email"></span>
            </div>
            <hr class="user-menu__divider" />
            <button id="tutorial-toggle-btn" class="user-menu__item" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              <span data-i18n="menu.tutorial">튜토리얼 다시 보기</span>
            </button>
            <div id="lang-menu-item" class="user-menu__item user-menu__lang">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              <span data-i18n="menu.language">언어</span>
              <span id="lang-menu-current" class="user-menu__lang-current"></span>
            </div>
            <hr class="user-menu__divider" />
            <button id="logout-btn" class="user-menu__logout" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              <span data-i18n="menu.logout">로그아웃</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="map-shell">
      <div id="map" aria-label="Korea map"></div>

      <!-- 검색 결과 없음 토스트 -->
      <div id="no-results" class="toast toast--error" role="alert" aria-live="assertive">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="15" y1="9" x2="9" y2="15" />
          <line x1="9" y1="9" x2="15" y2="15" />
        </svg>
        <span id="no-results-text"></span>
      </div>

      <!-- 상태 토스트 -->
      <div id="status" class="toast toast--info" role="status" aria-live="polite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
        <span id="status-text"></span>
      </div>
    </main>

    <!-- ==================== 하단 배너 광고 (free 유저만) ==================== -->
    <div class="ad-slot ad-slot--banner" id="ad-banner" hidden>
      <span class="ad-slot__label" data-i18n="ad.sponsored">광고</span>
      <ins class="adsbygoogle"
        style="display:block;max-height:50px"
        data-ad-client="ca-pub-6570449864880886"
        data-ad-slot="XXXXXXXXXX"
        data-ad-format="banner"
        data-full-width-responsive="false"></ins>
    </div>

    <!-- 모바일 바텀시트 백드롭 -->
    <div id="panel-backdrop" class="panel-backdrop" hidden></div>

    <!-- ==================== 내 맛집 사이드 패널 ==================== -->
    <aside id="my-reviews-panel" class="my-reviews-panel" aria-label="내 맛집 목록">
      <div class="my-reviews-panel__header">
        <div class="my-reviews-panel__header-row">
          <div class="my-reviews-panel__title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            <span data-i18n="myReviews.title">내 맛집</span>
          </div>
          <span id="my-reviews-panel-count" class="my-reviews-panel__count"></span>
          <button id="my-reviews-panel-close" class="my-reviews-panel__close-btn" type="button" aria-label="닫기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- 카테고리 필터 칩 -->
      <div class="mrp-filter" id="mrp-filter">
        <button class="mrp-filter__chip is-active" data-category="all">
          <span data-i18n="category.all">전체</span>
          <span class="mrp-filter__count" data-cat-count="all"></span>
        </button>
        <button class="mrp-filter__chip" data-category="restaurant">
          🍽 <span data-i18n="category.restaurant">식당</span>
          <span class="mrp-filter__count" data-cat-count="restaurant"></span>
        </button>
        <button class="mrp-filter__chip" data-category="cafe">
          ☕ <span data-i18n="category.cafe">카페</span>
          <span class="mrp-filter__count" data-cat-count="cafe"></span>
        </button>
        <button class="mrp-filter__chip" data-category="attraction">
          🏛 <span data-i18n="category.attraction">관광명소</span>
          <span class="mrp-filter__count" data-cat-count="attraction"></span>
        </button>
        <button class="mrp-filter__chip" data-category="etc">
          📌 <span data-i18n="category.etc">기타</span>
          <span class="mrp-filter__count" data-cat-count="etc"></span>
        </button>
      </div>
      <div id="my-reviews-panel-list" class="my-reviews-panel__list">
        <!-- 지역별 그룹 (myreviews.js에서 동적 렌더링) -->
      </div>
      <!-- 패널 하단 광고 (free 유저만) -->
      <div class="ad-slot ad-slot--panel" id="ad-panel" hidden>
        <ins class="adsbygoogle"
          style="display:block;max-height:60px"
          data-ad-client="ca-pub-6570449864880886"
          data-ad-slot="XXXXXXXXXX"
          data-ad-format="banner"
          data-full-width-responsive="false"></ins>
      </div>
    </aside>
  </div>

  <!-- ==================== 리뷰 모달 ==================== -->
  <div id="review-overlay" class="review-overlay" hidden></div>
  <div id="review-modal" class="review-modal" hidden role="dialog" aria-modal="true" aria-label="리뷰 작성">
    <div class="review-modal__header">
      <h2 class="review-modal__title" data-i18n="review.title">리뷰 남기기</h2>
      <button id="review-close-btn" class="review-modal__close" type="button" aria-label="닫기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="review-modal__body">
      <!-- 장소 정보 -->
      <div class="review-place">
        <div class="review-place__icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
        </div>
        <div>
          <div id="review-place-name" class="review-place__name"></div>
          <div id="review-place-meta" class="review-place__meta"></div>
          <div id="review-visit-badge" class="review-visit-badge" hidden></div>
        </div>
      </div>

      <!-- 별점 선택 -->
      <div class="review-section">
        <label class="review-section__label"><span data-i18n="review.ratingLabel">별점</span> <span class="review-section__required" data-i18n="review.required">필수</span></label>
        <div class="rating-group">
          <button type="button" class="rating-card" data-rating="1">
            <span class="rating-card__stars">⭐</span>
            <span class="rating-card__title" data-i18n="review.rating1.title">동네 맛집</span>
            <span class="rating-card__desc" data-i18n="review.rating1.desc">가볍게 다시 찾을 곳</span>
          </button>
          <button type="button" class="rating-card" data-rating="2">
            <span class="rating-card__stars">⭐⭐</span>
            <span class="rating-card__title" data-i18n="review.rating2.title">추천 맛집</span>
            <span class="rating-card__desc" data-i18n="review.rating2.desc">일부러 찾아갈 맛</span>
          </button>
          <button type="button" class="rating-card" data-rating="3">
            <span class="rating-card__stars">⭐⭐⭐</span>
            <span class="rating-card__title" data-i18n="review.rating3.title">인생 맛집</span>
            <span class="rating-card__desc" data-i18n="review.rating3.desc">두고두고 생각나는 맛</span>
          </button>
        </div>
        <input type="hidden" id="review-rating-value" />
      </div>

      <!-- 사진 업로드 -->
      <div class="review-section">
        <label class="review-section__label"><span data-i18n="review.photoLabel">사진</span> <span class="review-section__required" data-i18n="review.required">필수</span></label>
        <div id="photo-zone" class="photo-zone">
          <input id="photo-input" type="file" accept="image/*,.heic,.heif" hidden />
          <img id="photo-preview" class="photo-zone__preview" src="" alt="미리보기" hidden />
          <div id="photo-prompt" class="photo-zone__prompt">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
            <span data-i18n="review.photoPrompt">클릭하거나 드래그하여 사진 첨부</span>
            <span class="photo-zone__hint" data-i18n="review.photoHint">JPG, PNG, HEIC (최대 10MB)</span>
          </div>
        </div>
      </div>

      <!-- 리뷰 텍스트 -->
      <div class="review-section">
        <label class="review-section__label" for="review-text" data-i18n="review.textLabel">리뷰</label>
        <textarea id="review-text" class="review-textarea" rows="3" placeholder="맛, 분위기, 서비스 등 자유롭게 작성해 주세요" data-i18n-placeholder="review.textPlaceholder"></textarea>
      </div>

      <!-- 방문 날짜 -->
      <div class="review-section">
        <label class="review-section__label" data-i18n="review.dateLabel">방문 날짜</label>
        <p class="review-section__hint" data-i18n="review.dateHint">스크롤하여 날짜를 선택하세요 (기본: 오늘)</p>
        <div class="date-picker">
          <div class="date-picker__highlight"></div>
          <div class="date-picker__col">
            <ul id="wheel-year" class="wheel"></ul>
          </div>
          <div class="date-picker__col">
            <ul id="wheel-month" class="wheel"></ul>
          </div>
          <div class="date-picker__col">
            <ul id="wheel-day" class="wheel"></ul>
          </div>
        </div>
      </div>

      <!-- 에러 메시지 -->
      <div id="review-error" class="review-error" hidden></div>
    </div>

    <div class="review-modal__footer">
      <button id="review-cancel-btn" class="review-modal__cancel" type="button" data-i18n="review.cancel">취소</button>
      <button id="review-submit-btn" class="review-modal__submit" type="button" data-i18n="review.submit">리뷰 저장하기</button>
    </div>
    <!-- 리뷰 모달 하단 광고 (free 유저만) -->
    <div class="ad-slot ad-slot--modal" id="ad-modal" hidden>
      <ins class="adsbygoogle"
        style="display:block;max-height:60px"
        data-ad-client="ca-pub-6570449864880886"
        data-ad-slot="XXXXXXXXXX"
        data-ad-format="banner"
        data-full-width-responsive="false"></ins>
    </div>
  </div>

  <!-- ==================== 리뷰 상세 패널 ==================== -->
  <div id="review-detail-backdrop" class="review-detail-backdrop"></div>
  <div id="review-detail" class="review-detail" role="dialog" aria-modal="true" aria-label="리뷰 상세">
    <div class="review-detail__handle"></div>
    <div class="review-detail__header">
      <div class="review-detail__info">
        <div id="review-detail-name" class="review-detail__name"></div>
        <div id="review-detail-address" class="review-detail__address"></div>
      </div>
      <button id="review-detail-close" class="review-detail__close" type="button" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <img id="review-detail-photo" class="review-detail__photo" src="" alt="리뷰 사진" />
    <div class="review-detail__body">
      <!-- 같은 장소 여러 방문 시 스와이프 내비게이션 -->
      <div id="review-detail-nav" class="review-detail__nav" hidden>
        <button id="review-detail-prev" class="review-detail__nav-btn" type="button" aria-label="이전 리뷰">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <span id="review-detail-counter" class="review-detail__counter"></span>
        <button id="review-detail-next" class="review-detail__nav-btn" type="button" aria-label="다음 리뷰">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>
      <div id="review-detail-rating" class="review-detail__rating"></div>
      <div id="review-detail-date" class="review-detail__date"></div>
      <p id="review-detail-text" class="review-detail__text"></p>
    </div>
  </div>

  <!-- ==================== 튜토리얼 오버레이 ==================== -->
  <div id="tutorial-overlay" class="tutorial" hidden>
    <div id="tutorial-card" class="tutorial__card">
      <span id="tutorial-step-num" class="tutorial__step-num"></span>
      <div id="tutorial-icon" class="tutorial__icon"></div>
      <h2 id="tutorial-title" class="tutorial__title"></h2>
      <p id="tutorial-body" class="tutorial__body"></p>
      <div id="tutorial-dots" class="tutorial__dots"></div>
      <div class="tutorial__actions">
        <button id="tutorial-prev" class="tutorial__btn tutorial__btn--secondary" type="button" data-i18n="tutorial.btn.prev">이전</button>
        <button id="tutorial-next" class="tutorial__btn tutorial__btn--primary" type="button" data-i18n="tutorial.btn.next">다음</button>
      </div>
      <button id="tutorial-skip" class="tutorial__skip" type="button" data-i18n="tutorial.btn.skip">건너뛰기</button>
    </div>
  </div>

  <!-- ==================== Scripts ==================== -->
  <!-- Supabase JS SDK (v2) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- HEIC → JPEG 변환 (iOS 사진 업로드 지원) -->
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="{{ kakao_sdk_url }}?appkey={{ kakao_js_key }}&autoload=false&libraries=services"></script>
  <script type="module" src="/static/i18n.js?v={{ v }}"></script>
  <script type="module" src="/static/auth.js?v={{ v }}"></script>
  <script type="module" src="/static/reviewCache.js?v={{ v }}"></script>
  <script type="module" src="/static/main.js?v={{ v }}"></script>
  <script type="module" src="/static/reviews.js?v={{ v }}"></script>
  <script type="module" src="/static/tutorial.js?v={{ v }}"></script>
  <script type="module" src="/static/myreviews.js?v={{ v }}"></script>
  <script type="module" src="/static/ads.js?v={{ v }}"></script>
</body>

</html>
